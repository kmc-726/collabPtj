spring.application.name=collab
spring.config.import=optional:classpath:application-local.properties

# ==========================================
# Server Configuration
# ==========================================
server.port=${SERVER_PORT}
server.jackson.time-zone=Asia/Seoul
spring.output.ansi.enabled=always

# ==========================================
# Database Configuration
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.initialization-fail-timeout=60000

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
logging.level.org.hibernate.tool.schema=DEBUG

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET}
jwt.expiration-time=${JWT_EXPIRATION_TIME}
jwt.refresh-expiration-time=${JWT_REFRESH_EXPIRATION_TIME}

# ==========================================
# Google OAuth 2.0 Configuration
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ==========================================
# SMTP Configuration
# ==========================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
